services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mediacompressor-internal

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mediacompressor-internal

  migrate:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command:
      [
        'sh',
        '-c',
        'apt-get update -y && apt-get install -y openssl && corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && pnpm --filter @mediacompressor/db prisma:migrate:deploy',
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - mediacompressor-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # UC14-Fix: connection_limit=20 prevents Prisma-pool-exhaustion under
      # Pre-Create-Hook bursts (advisory-lock + 4 quota-queries per call,
      # default pool of 10 saturates at ~3 concurrent uploads per replica).
      DATABASE_URL: ${DATABASE_URL}&connection_limit=20
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      # Plan 5: tusd shared-secret + canonical media paths. The hook routes
      # require these; defaults in apps/api/src/config.ts already match
      # /media/tusd-data + /media/uploads, but we set them explicitly so
      # `compose config` is self-documenting.
      TUSD_SHARED_SECRET: ${TUSD_SHARED_SECRET}
      TUSD_DATA_DIR: /media/tusd-data
      TUSD_FINAL_DIR: /media/uploads
      MEDIA_MOUNT_PATH: /media
      MIN_FREE_BYTES_RESERVE: ${MIN_FREE_BYTES_RESERVE:-5368709120}
      PORT: 3000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      init-media: { condition: service_completed_successfully }
    ports: ['3000:3000']
    volumes:
      # UC4-Fix: api needs read+write on the shared media-data volume so the
      # post-finish-hook can rename tusd-data/${id}.bin →
      # uploads/${user}/${id}/source.bin in O(1) (same filesystem ⇒ atomic
      # rename, no EXDEV).
      - media-data:/media
    networks: [mediacompressor-internal]

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      # UC14-Fix: same connection_limit reasoning as api. Worker reads job-state
      # + writes progress throttled, but burst-load (queue drains after a long
      # stall) can hit pool-saturation otherwise.
      DATABASE_URL: ${DATABASE_URL}&connection_limit=20
      REDIS_URL: redis://redis:6379
      # API_KEY_PEPPER: worker config schema (apps/worker/src/config.ts) requires
      # this for symmetry with apps/api (HMAC-SHA-256 keyed lookups). Plan-2-Fix.
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      # C12-Rev2: per-Container-Concurrency. Default 2 → 1 Video + 1 Image parallel.
      # Skalierung per `docker compose up -d --scale worker=N`.
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      init-media: { condition: service_completed_successfully }
    volumes:
      # Worker reads source.bin from /media/uploads and writes results back
      # to the same volume.
      - media-data:/media
    networks: [mediacompressor-internal]

  # Plan 5 Task 8 follow-up: media-data volume is created root-owned by
  # docker; tusd, api, and worker all run as uid 1000 (`node`/`tusd` user).
  # Without this init container, tusd fails at boot with
  # "mkdir /media/tusd-data: permission denied". We create the canonical
  # subdirs and chown them once, then exit successfully.
  init-media:
    image: alpine:3.20
    command:
      [
        'sh',
        '-c',
        'mkdir -p /media/tusd-data /media/uploads && chown -R 1000:1000 /media && chmod -R 0755 /media',
      ]
    user: '0:0'
    volumes:
      - media-data:/media
    restart: 'no'

  # Plan 5 Task 8: tusd resumable-upload server. tusd implements the tus
  # protocol, persists chunked uploads, and POSTs hook events back to the api
  # service so we can authorize, reserve quota (pre-create), and move the
  # finished file into the final layout (post-finish).
  tusd:
    # UC3-Fix: pin to exact patch version. Hook-body schema is 2.x-specific;
    # `:latest` would let upstream changes silently break our hooks.
    image: tusproject/tusd:v2.4.0
    command:
      - '-host=0.0.0.0'
      - '-port=1080'
      - '-base-path=/uploads/'
      # UC4-Fix: tusd-data als Subdir von /media (= media-data volume),
      # damit fs.rename(tusd-data → uploads) atomar O(1) ist.
      - '-upload-dir=/media/tusd-data'
      # tusd v2 sends ALL hook events (pre-create, post-finish, …) to this
      # single URL; the api dispatches by body.Type
      # (apps/api/src/uploads/hooks-dispatcher.ts).
      - '-hooks-http=http://api:3000/api/v1/internal/uploads/hooks'
      # UC5: forward Authorization so the pre-create-hook can authenticate
      # the user via Bearer-API-Key.
      - '-hooks-http-forward-headers=Authorization,X-CSRF-Token'
      # 2 GiB hard cap per upload; pre-create-hook + worker enforce
      # per-user / per-profile limits on top.
      - '-max-size=2147483648'
      # NOTE: tusd v2.4.0 has NO CLI flag to inject a static header on hook
      # calls (`-hooks-http-header` does not exist; only
      # `-hooks-http-forward-headers` for client-supplied headers). Plan 9
      # will front tusd with Caddy that injects X-Tusd-Shared-Secret. Until
      # then, network trust is enforced via the docker-internal network and
      # `TUSD_REQUIRE_SHARED_SECRET=false` on the api side. The api still
      # rejects forged headers, so a future Caddy enabling won't change
      # the accept-criteria semantics.
    volumes:
      - media-data:/media
    depends_on:
      api: { condition: service_started }
      init-media: { condition: service_completed_successfully }
    networks: [mediacompressor-internal]
    # In production (Plan 9 Caddy) port 1080 is NOT exposed; here it's open
    # so the E2E smoke-script (apps/api/test-e2e/upload-flow.sh) can drive
    # the tus protocol from the host.
    ports: ['1080:1080']

volumes:
  postgres-data:
  redis-data:
  # Shared upload volume mounted by api + worker + tusd. Single mount point
  # is the precondition for atomic O(1) rename in post-finish-hook (UC4).
  media-data:

networks:
  mediacompressor-internal:
    driver: bridge
    # internal: true wird in Plan 9 ergänzt, sobald die Worker-/API-Egress-Trennung
    # final konfiguriert ist. In Foundation muss migrate noch online installieren.
