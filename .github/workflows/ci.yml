name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mediacompressor
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: mediacompressor
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mediacompressor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (ffmpeg, libvips, libheif + build deps for sharp HEIC)
        run: |
          sudo apt-get update -y
          # Diagnose: zeige verfügbare libheif-Pakete (für CI-Log-Lesbarkeit)
          apt-cache search libheif | head -20 || true
          # Runtime-Pflicht-Pakete + Build-Toolchain für sharp from-source (Plan 2 Task 4-bis):
          # libvips-dev, libheif-dev, build-essential, python3 sind nötig, damit sharp
          # gegen system-libvips linkt (statt prebuild ohne HEVC-Encoder).
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libvips42 \
            libvips-dev \
            libheif1 \
            libheif-dev \
            build-essential \
            python3
          # x265-Plugin Pflicht (Plan 2 Task 4-bis): sharp baut from-source gegen
          # system-libvips, das libheif-plugin-x265 zur Laufzeit lädt. Ohne dieses
          # Plugin schlägt sharp.heif({ compression: 'hevc' }) mit "Unsupported
          # compression" fehl und HEIC-Tests sind rot.
          sudo apt-get install -y --no-install-recommends \
              libheif-plugin-libde265 libheif-plugin-x265 \
              libheif-plugin-aomenc \
            || echo "warning: libheif plugins not available — HEIC/AVIF encoding may fail"
          # Verifikation
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          vips --version
          ls -la /usr/lib/x86_64-linux-gnu/libheif/plugins/ || true
          ldconfig -p | grep -i heif || echo "warning: libheif not linked"

      - name: Configure sharp build-from-source for HEIC support
        # SHARP_FORCE_GLOBAL_LIBVIPS=true is also in .npmrc; we set it in $GITHUB_ENV
        # as well so all subsequent steps see the variable and pnpm install builds
        # sharp from source against system libvips (with HEVC encoder).
        run: |
          echo "SHARP_FORCE_GLOBAL_LIBVIPS=true" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @mediacompressor/db prisma:generate

      - name: Apply migrations
        run: pnpm --filter @mediacompressor/db prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://mediacompressor:ci@localhost:5432/mediacompressor?schema=public

      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://mediacompressor:ci@localhost:5432/mediacompressor?schema=public
          REDIS_URL: redis://localhost:6379
