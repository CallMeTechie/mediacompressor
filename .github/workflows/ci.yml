name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mediacompressor
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: mediacompressor
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mediacompressor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (ffmpeg, libvips, libheif)
        run: |
          sudo apt-get update -y
          # Diagnose: zeige verfügbare libheif-Pakete (für CI-Log-Lesbarkeit)
          apt-cache search libheif | head -20 || true
          # Pflicht-Pakete (auf allen ubuntu-latest-Generationen verfügbar)
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libvips42 \
            libheif1
          # Plugin-Pakete optional — auf Ubuntu 22.04 sind die Decoder bereits in
          # libheif1 integriert; auf 24.04 sind sie als separate Pakete verfügbar.
          # Wir installieren best-effort und brechen NICHT bei Fehlschlag ab (C3-Rev2-Fix).
          sudo apt-get install -y --no-install-recommends \
              libheif-plugin-libde265 libheif-plugin-x265 \
            || echo "info: libheif-plugin-* not separate on this Ubuntu; integrated in libheif1"
          # Verifikation
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          vips --version
          ldconfig -p | grep -i heif || echo "warning: libheif not linked"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @mediacompressor/db prisma:generate

      - name: Apply migrations
        run: pnpm --filter @mediacompressor/db prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://mediacompressor:ci@localhost:5432/mediacompressor?schema=public

      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://mediacompressor:ci@localhost:5432/mediacompressor?schema=public
          REDIS_URL: redis://localhost:6379
