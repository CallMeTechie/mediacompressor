# Plan 9 Task 2: Production-overlay.
# Usage:
#   docker compose --env-file .env.production \
#     -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Caddy is the only public-facing service (80/443/443udp). api and tusd
# lose their host port-mappings via `!reset []` (docker-compose v2.24+).
# Restart-policies, resource-limits, and log-rotation per Plan 9 Rev. 2.1.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      TUSD_SHARED_SECRET: ${TUSD_SHARED_SECRET}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api: { condition: service_started }
      tusd: { condition: service_started }
    networks: [mediacompressor-internal]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  api:
    ports: !reset []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  worker:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  tusd:
    ports: !reset []
    restart: unless-stopped
    environment:
      TUSD_REQUIRE_SHARED_SECRET: 'true'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  caddy-data:
  caddy-config:
