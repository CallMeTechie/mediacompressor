# Plan 9 Task 2 Rev. 2.1 WC-prod-15: Staging-Caddy overlay.
# Use during first-deploy-iterations to avoid burning Let's Encrypt
# production rate-limit (50 certs/domain/week).
#
# Usage:
#   docker compose --env-file .env.production \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     -f docker-compose.prod.staging-caddy.yml \
#     up -d
#
# Switch to production-cutover by removing this overlay-file from the
# command (Caddy then mounts the production Caddyfile via docker-compose.prod.yml).
#
# NOTE: Compose REPLACES (not merges) the volumes-list under a service when
# overlaying. Therefore caddy-data + caddy-config MUST be re-declared here,
# or staging-mode would lose cert-persistence between restarts.

services:
  caddy:
    volumes:
      - ./caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
